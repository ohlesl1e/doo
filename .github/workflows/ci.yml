name: CI

# Slice-1 CI safety net (T8): lint + type-check + the full pytest suite, including
# the testcontainer-backed integration tests (Neo4j Community / Redis / MinIO) and
# the OPA dual-path Scope test. Runs on PRs and on pushes to main.
#
# The integration tests use `testcontainers`, which talks to the Docker daemon that
# GitHub's ubuntu-latest runners provide out of the box — so no `services:` block is
# needed; the tests start and tear down their own containers. Neo4j runs **Community**
# per ADR-0021 (the schema bootstrap is edition-aware and skips the Enterprise-only
# existence constraints on Community).

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    # The suite is mostly testcontainer-backed integration (Neo4j/Redis/MinIO per
    # test class); it outgrew the original 10-minute budget as slices landed.
    # Shared/session-scoped containers to bring this back down is a follow-up.
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install OPA (for the dual-path Scope test)
        run: |
          curl -fsSL -o /usr/local/bin/opa \
            https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x /usr/local/bin/opa
          opa version

      - name: Pre-pull testcontainer images
        # Pull the pinned images in an explicit step so the cold-pull cost is
        # visible here rather than charged to a test's container setup time (#99).
        run: |
          docker pull neo4j:5.26-community
          docker pull redis:7.4-alpine
          docker pull minio/minio:RELEASE.2024-12-18T13-15-44Z

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Type-check (mypy, strict)
        run: mypy src

      - name: Tests (unit + testcontainer integration + dual-path)
        # `-n auto` = one xdist worker per runner core (4 on ubuntu-latest); each
        # worker starts its own session-scoped testcontainer set. Local default
        # stays serial (no `-n` in addopts) so a dev box with many cores doesn't
        # spawn N×3 containers.
        run: pytest -q -n auto
